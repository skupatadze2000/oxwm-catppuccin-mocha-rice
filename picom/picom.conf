# Enable rounded corners for all windows
corner-radius = 10;

# Make sure borders are rounded too
round-borders = 1;

# Exclude specific things that look bad rounded
rounded-corners-exclude = [
  "window_type = 'dock'",
  "class_g = 'Polybar'"
];

# Rendering engine (glx is smoother for Intel UHD graphics)
backend = "glx";
vsync = true;
